<!DOCTYPE html>
<html lang="kab">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ad aruɣ war tuccḍiwin — Talemmizt n tira</title>
<meta name="description" content="Apprendre à écrire le kabyle (taqbaylit) sans fautes — leçons interactives, règles et livre PDF.">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ad aruɣ">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<style>
/* ============================================================
   DESIGN TOKENS — white background, Google palette
   Mobile-first: full-height flex shell, bottom bars in-flow
   (NOT position:fixed), inline SVG icons (no CDN dependency).
   ============================================================ */
:root{
  --bg:#FFFFFF;
  --card:#FFFFFF;
  --ink:#202124;
  --ink-soft:#5F6368;
  --border:#DADCE0;
  --blue:#4285F4;   --blue-dark:#1A73E8;  --blue-soft:#E8F0FE;
  --green:#34A853;  --green-dark:#188038; --green-soft:#E6F4EA;
  --yellow:#FBBC05; --yellow-dark:#F29900;--yellow-soft:#FEF7E0;
  --red:#EA4335;    --red-dark:#C5221F;   --red-soft:#FCE8E6;
  --radius:16px;
  --shadow:0 1px 3px rgba(60,64,67,.18), 0 1px 2px rgba(60,64,67,.1);
  --font-display:'Google Sans','Product Sans',ui-rounded,'Baloo 2',system-ui,sans-serif;
  --font-body:Roboto,'Nunito',system-ui,-apple-system,'Segoe UI',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--ink);
  line-height:1.5;
  height:100vh;height:100dvh;
  overflow:hidden;
  touch-action:manipulation;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
h1,h2,h3{font-family:var(--font-display);line-height:1.2}
svg.lic{width:1.05em;height:1.05em;vertical-align:-0.15em;display:inline-block;flex:none}

/* ============ APP SHELL: header / scrollable main / bottom bar ============ */
#app{
  max-width:640px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  background:#fff;
}
header{
  flex:none;position:relative;
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:10px 12px 12px;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;
}
header::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:4px;
  background:linear-gradient(90deg,var(--blue) 0 25%,var(--red) 25% 50%,var(--yellow) 50% 75%,var(--green) 75% 100%);
}
.logo{display:flex;align-items:center;flex:none}
.logo .yaz-badge{
  width:40px;height:40px;flex:none;
  display:flex;align-items:center;justify-content:center;
  background:var(--red-soft);border-radius:12px;
}
.logo .yaz{width:26px;height:26px;flex:none}
.spacer{flex:1}
.stat{display:flex;align-items:center;gap:3px;font-weight:700;font-size:.92rem;flex:none}
.stat.hearts{color:var(--red)}
.stat.xp{color:var(--yellow-dark)}
.stat svg.lic{width:1.1em;height:1.1em}
.lang-switch{
  display:flex;border:1.5px solid var(--blue);border-radius:999px;overflow:hidden;
  font-weight:700;font-size:.74rem;flex:none;
}
.lang-switch button{padding:4px 9px;color:var(--blue-dark);background:transparent}
.lang-switch button.active{background:var(--blue);color:#fff}

main{
  flex:1 1 0;min-height:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 14px 24px;
}

/* ---- bottom bars: normal flow, always on screen ---- */
#bottombar{flex:none;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs{
  background:#fff;border-top:1px solid var(--border);
  display:flex;justify-content:center;gap:6px;padding:6px 8px;
}
nav.tabs button{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 4px;border-radius:12px;font-weight:700;font-size:.72rem;color:var(--ink-soft);
}
nav.tabs button.active{background:var(--blue-soft);color:var(--blue-dark)}
nav.tabs .ticn svg.lic{width:1.35rem;height:1.35rem}

.foot{
  background:#fff;border-top:1px solid var(--border);
  padding:12px 14px;
  transition:background .2s;
}
.foot.ok{background:var(--green-soft)}
.foot.ko{background:var(--red-soft)}
.fb-title{font-family:var(--font-display);font-weight:700;font-size:1rem;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.foot.ok .fb-title{color:var(--green-dark)}
.foot.ko .fb-title{color:var(--red-dark)}
.fb-body{font-size:.9rem;margin-bottom:8px}
.fb-body b{font-size:1rem}
.bigbtn{
  display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
  background:var(--green);color:#fff;font-family:var(--font-display);font-weight:700;
  font-size:1rem;border-radius:14px;padding:12px;box-shadow:0 3px 0 var(--green-dark);
  transition:transform .1s;letter-spacing:.3px;
}
.bigbtn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark)}
.bigbtn:disabled{background:#F1F3F4;box-shadow:0 3px 0 var(--border);color:#9AA0A6}
.bigbtn.redb{background:var(--red);box-shadow:0 3px 0 var(--red-dark)}
.bigbtn.redb:active{box-shadow:0 1px 0 var(--red-dark)}
.bigbtn.ghost{background:#fff;color:var(--blue-dark);border:2px solid var(--blue);box-shadow:0 3px 0 var(--blue-soft)}

/* ============ DOWNLOAD BOOK + CONTACT CARDS ============ */
.bookcard{
  display:flex;align-items:center;gap:12px;
  background:var(--green-soft);border:1px solid #CEEAD6;border-radius:var(--radius);
  padding:14px;margin-bottom:16px;
}
.bookcard .bicn{
  width:44px;height:44px;flex:none;border-radius:12px;background:#fff;
  display:flex;align-items:center;justify-content:center;color:var(--green-dark);
}
.bookcard .bicn svg.lic{width:1.5rem;height:1.5rem}
.bookcard .btxt{flex:1;min-width:0}
.bookcard .btxt b{display:block;font-size:.98rem;color:var(--green-dark)}
.bookcard .btxt span{font-size:.82rem;color:var(--ink-soft)}
.dl-btn{
  flex:none;display:inline-flex;align-items:center;gap:6px;
  background:var(--green);color:#fff;font-weight:700;font-size:.86rem;
  padding:9px 14px;border-radius:999px;text-decoration:none;
  box-shadow:0 3px 0 var(--green-dark);
}
.dl-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--green-dark)}
.dl-btn svg.lic{width:1.05rem;height:1.05rem}
.contactcard{
  background:var(--blue-soft);border:1px solid #C6DAFC;border-radius:var(--radius);
  padding:14px 16px;margin:16px 0 4px;
}
.contactcard h3{font-size:.98rem;color:var(--blue-dark);display:flex;align-items:center;gap:7px}
.contactcard p{font-size:.85rem;color:var(--ink-soft);margin:3px 0 8px}
.contactcard a.mail{
  display:inline-flex;align-items:center;gap:7px;font-weight:700;color:var(--blue-dark);
  text-decoration:none;font-size:.95rem;background:#fff;border:1px solid #C6DAFC;
  padding:8px 14px;border-radius:999px;
}
.contactcard a.mail svg.lic{width:1.05rem;height:1.05rem}

/* ============ HOME / PATH ============ */
.hero{
  background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);
  color:#fff;border-radius:18px;padding:16px;margin-bottom:20px;
  position:relative;overflow:hidden;box-shadow:var(--shadow);
}
.hero::after{
  content:"ⵣ";position:absolute;right:-12px;bottom:-30px;font-size:7.5rem;opacity:.14;font-family:var(--font-display);
}
.hero h1{font-size:1.3rem;margin-bottom:5px}
.hero p{font-size:.88rem;opacity:.95;max-width:36ch}
.hero .streakline{margin-top:9px;display:inline-flex;gap:6px;align-items:center;background:rgba(255,255,255,.18);padding:4px 11px;border-radius:999px;font-weight:700;font-size:.82rem}

.path{position:relative;display:flex;flex-direction:column;align-items:center;gap:30px;padding:8px 0 24px}
.path::before{
  content:"";position:absolute;top:20px;bottom:20px;width:6px;border-radius:3px;
  background:repeating-linear-gradient(var(--border) 0 12px, transparent 12px 24px);
}
.node{position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;width:190px;max-width:60vw}
.node:nth-child(odd){transform:translateX(-44px)}
.node:nth-child(even){transform:translateX(44px)}
.node-btn{
  width:78px;height:78px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
  background:#fff;border:3px solid var(--border);color:var(--ink-soft);
  box-shadow:var(--shadow);
  transition:transform .15s;
}
.node-btn svg.lic{width:1.9rem;height:1.9rem}
.node-btn:active{transform:scale(.95)}
.node.done .node-btn{background:var(--yellow);border-color:var(--yellow-dark);color:#fff}
.node.current .node-btn{background:var(--blue);border-color:var(--blue-dark);color:#fff;animation:pulse 1.8s infinite}
.node .stars{font-size:.82rem;letter-spacing:2px;color:var(--yellow-dark);height:1em}
.node .nlabel{font-weight:700;font-size:.8rem;text-align:center;color:var(--ink);background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:3px 9px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@media (max-width:400px){
  .node:nth-child(odd){transform:translateX(-30px)}
  .node:nth-child(even){transform:translateX(30px)}
  .node-btn{width:70px;height:70px}
}

/* ============ GENERIC CARD ============ */
.card{
  background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:14px;box-shadow:var(--shadow);margin-bottom:12px;
}

/* ============ LESSON SCREEN ============ */
.lesson-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.quitbtn{color:var(--ink-soft);font-weight:700;display:flex;padding:4px}
.quitbtn svg.lic{width:1.35rem;height:1.35rem}
.pbar{flex:1;height:13px;background:#F1F3F4;border-radius:999px;overflow:hidden}
.pbar>div{height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--green-dark));border-radius:999px;transition:width .4s ease}
.lesson-hearts{color:var(--red);font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px}
.lesson-hearts svg.lic{width:1.15em;height:1.15em}

.step{animation:slidein .3s ease}
@keyframes slidein{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:none}}
.step.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-9px)}40%,80%{transform:translateX(9px)}}

.rulecard .rtag{
  display:inline-flex;align-items:center;gap:5px;background:var(--blue-soft);color:var(--blue-dark);
  font-weight:700;font-size:.7rem;border-radius:999px;padding:3px 10px;margin-bottom:9px;letter-spacing:.4px;
}
.rulecard p.rk{font-size:.98rem;font-weight:600}
.rulecard p.rf{font-size:.9rem;color:var(--ink-soft);margin-top:8px;border-top:1.5px dashed var(--border);padding-top:8px}
.exchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.exchips span{background:var(--yellow-soft);border:1.5px solid var(--yellow);border-radius:10px;padding:3px 9px;font-weight:700;font-size:.88rem;color:var(--ink)}

.prompt{font-family:var(--font-display);font-weight:700;font-size:1.06rem;margin-bottom:12px}
.wrongword{
  display:inline-block;background:var(--red-soft);color:var(--red-dark);
  text-decoration:line-through;font-weight:700;border-radius:10px;padding:4px 11px;font-size:1.04rem;
}
.ctxnote{font-size:.84rem;color:var(--ink-soft);margin-top:6px}

.opts{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.opt{
  text-align:left;background:#fff;border:2px solid var(--border);border-radius:14px;
  padding:11px 13px;font-size:1rem;font-weight:600;box-shadow:var(--shadow);
  transition:border-color .15s, background .15s, transform .1s;
  display:flex;align-items:center;gap:8px;
}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--blue);background:var(--blue-soft)}
.opt.good{border-color:var(--green);background:var(--green-soft)}
.opt.bad{border-color:var(--red);background:var(--red-soft)}
.opts.tf{flex-direction:row}
.opts.tf .opt{flex:1;justify-content:center;text-align:center}
.opt .tficn-true{color:var(--green-dark);display:flex}
.opt .tficn-false{color:var(--red-dark);display:flex}

/* tiles (word-bank) */
.answer-zone{
  min-height:52px;border-bottom:2px dashed var(--border);
  display:flex;flex-wrap:wrap;gap:8px;padding:8px 2px;margin-bottom:14px;
}
.bank{display:flex;flex-wrap:wrap;gap:8px}
.tile{
  background:#fff;border:1.5px solid var(--border);border-radius:12px;
  padding:8px 12px;font-weight:700;font-size:1rem;box-shadow:var(--shadow);
  transition:transform .1s;
}
.tile:active{transform:scale(.95)}
.tile.used{opacity:.25;pointer-events:none}
.answer-zone .tile{background:var(--blue-soft);border-color:var(--blue)}

/* matching */
.matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.mitem{
  background:#fff;border:2px solid var(--border);border-radius:14px;
  padding:11px 6px;font-weight:700;text-align:center;font-size:.94rem;
  box-shadow:var(--shadow);
}
.mitem.sel{border-color:var(--blue);background:var(--blue-soft)}
.mitem.lock{border-color:var(--green);background:var(--green-soft);opacity:.65;pointer-events:none}
.mitem.err{border-color:var(--red);background:var(--red-soft)}

/* ============ END SCREEN ============ */
.endscreen{text-align:center;padding-top:16px}
.endscreen .mascot{width:118px;margin:0 auto 6px;animation:bounce 1s infinite alternate ease-in-out}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.endscreen h2{font-size:1.45rem;color:var(--blue-dark);margin-bottom:6px}
.endstars{font-size:2rem;letter-spacing:6px;color:var(--yellow-dark);margin:8px 0}
.endstats{display:flex;justify-content:center;gap:10px;margin:12px 0 18px}
.endstats .pill{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:9px 14px;font-weight:700;box-shadow:var(--shadow)}
.endstats .pill small{display:block;font-size:.68rem;color:var(--ink-soft);font-weight:600}

/* ============ LIBRARY ============ */
.lib h2{font-size:1.15rem;color:var(--blue-dark);margin:16px 0 10px}
.lib details{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.lib summary{cursor:pointer;font-family:var(--font-display);font-weight:700;padding:12px 14px;font-size:.96rem;list-style:none;display:flex;align-items:center;gap:9px}
.lib summary::-webkit-details-marker{display:none}
.lib summary .sicn{display:flex;color:var(--blue-dark)}
.lib summary .sicn svg.lic{width:1.2rem;height:1.2rem}
.lib .dbody{padding:0 14px 14px}
.rline{border-top:1.5px dashed var(--border);padding:9px 0}
.rline p.rk{font-weight:600;font-size:.94rem}
.rline p.rf{font-size:.87rem;color:var(--ink-soft);margin-top:4px}
table.reft{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:8px}
table.reft th{background:var(--blue-soft);color:var(--blue-dark);text-align:left;padding:6px 8px;font-size:.78rem}
table.reft td{border-bottom:1px solid var(--border);padding:6px 8px}
table.reft td.w{color:var(--red-dark);text-decoration:line-through;font-weight:600}
table.reft td.r{color:var(--green-dark);font-weight:700}
.symrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.symrow span{background:var(--yellow-soft);border:1.5px solid var(--yellow);border-radius:10px;padding:4px 9px;font-weight:700;color:var(--ink)}

/* confetti */
.cf{position:fixed;top:-16px;z-index:100;width:10px;height:16px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.6}}

.modal-bg{position:fixed;inset:0;background:rgba(32,33,36,.5);z-index:80;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border-radius:20px;padding:20px;max-width:380px;width:100%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.modal h3{font-size:1.15rem;margin-bottom:8px;color:var(--red-dark)}
.modal p{font-size:.92rem;margin-bottom:14px}
.modal .bigicn{color:var(--red);margin-bottom:6px;display:flex;justify-content:center}
.modal .bigicn svg.lic{width:3rem;height:3rem}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
}
</style>
</head>

<div id="app">
  <header>
    <div class="logo" role="img" aria-label="Yaz — ⵣ">
      <span class="yaz-badge">
        <svg class="yaz" viewBox="0 0 60 60" aria-hidden="true">
          <path d="M30 6 L14 20 M30 6 L46 20 M30 6 L30 40 M14 54 L30 40 L46 54 M8 32 L52 32" stroke="#EA4335" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </span>
    </div>
    <div class="spacer"></div>
    <div class="stat hearts"><span id="hIcn"></span><span id="statHearts">4</span></div>
    <div class="stat xp"><span id="xIcn"></span><span id="statXP">0</span></div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button id="btnKab" onclick="setLang('kab')">TAQ</button>
      <button id="btnFr" onclick="setLang('fr')">FR</button>
    </div>
  </header>

  <main id="main"></main>

  <div id="bottombar">
    <div class="foot" id="foot" style="display:none"><div id="footWrap"></div></div>
    <nav class="tabs" id="tabs">
      <button id="tabHome" onclick="goTab('home')"><span class="ticn" id="tabHomeI"></span><span id="tabHomeL">Agejdan</span></button>
      <button id="tabLib" onclick="goTab('lib')"><span class="ticn" id="tabLibI"></span><span id="tabLibL">Ilugan</span></button>
    </nav>
  </div>
</div>

<script>
"use strict";
/* ================================================================
   Ad aruɣ war tuccḍiwin — interactive Kabyle orthography trainer
   All rules and error/correction pairs come from the booklet
   "Ad aruɣ war tuccḍiwin" (Tala uMaziɣ).
   Locales: 'kab' (100% Kabyle) and 'fr' (French explanations).
   Icons: inline SVG (Lucide paths embedded — no CDN, always renders).
   Layout: flex shell; bottom bar is in normal flow, never off-screen.
   ================================================================ */

/* ---------------- inline icon set (24x24, stroke) ---------------- */
const ICONS = {
  "home":'<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  "book-open":'<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
  "heart":'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>',
  "heart-crack":'<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="m12 13-1-1 2-2-3-3 2-2"/>',
  "star":'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  "x":'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  "check":'<path d="M20 6 9 17l-5-5"/>',
  "flame":'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',
  "graduation-cap":'<path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>',
  "book-marked":'<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><polyline points="10 2 10 10 13 7 16 10 16 2"/>',

/* I(name, filled) -> inline SVG string; always renders, no hydration */
function I(name, filled){
  const body = ICONS[name] || ICONS["star"];
  const fill = filled ? "currentColor" : "none";
  return '<svg class="lic" viewBox="0 0 24 24" fill="'+fill+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+body+'</svg>';
}

/* ---------------- Exercise builders ---------------- */
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function pick(opts, correctIdx, ctx, expK, expF){
  return {type:"pick", opts, correct:opts[correctIdx], ctx, expK, expF};
}
function tf(answer, sK, sF){ return {type:"tf", answer, sK, sF}; }
function match(pairs, pK, pF){ return {type:"match", pairs, pK, pF}; }
function exFromPair(pr){
  const [wrong, right] = pr;
  const multi = right.trim().split(/\s+/).length >= 2;
  if(multi && Math.random() < 0.45){
    const tokens = right.trim().split(/\s+/);
    const wtoks = wrong.trim().split(/\s+/).filter(t=>!tokens.includes(t)).slice(0,2);
    return {type:"tiles", wrong, right, tokens, distractors:wtoks};
  }
  const opts = [right, wrong];
  const stripped = right.replace(/-/g," ").replace(/\s+/g," ").trim();
  if(stripped !== right && stripped.toLowerCase() !== wrong.toLowerCase() && Math.random() < 0.5){
    opts.push(stripped);
  }
  return {type:"fix", wrong, right, opts};
}

/* ---------------- State ---------------- */
const state = {
  lang:"kab",
  xp:0, hearts:4, streak:1,
  progress:{},
  tab:"home",
  session:null
};

async function loadState(){
  try{
    const r = await window.storage.get("adw-state");
    if(r && r.value){
      const s = JSON.parse(r.value);
      Object.assign(state, {lang:s.lang||"kab", xp:s.xp||0, streak:s.streak||1, progress:s.progress||{}});
    }
  }catch(e){ /* first run or storage unavailable */ }
}
async function saveState(){
  try{
    await window.storage.set("adw-state", JSON.stringify({
      lang:state.lang, xp:state.xp, streak:state.streak, progress:state.progress
    }));
  }catch(e){ /* best effort */ }
}

const t = k => I18N[state.lang][k];
const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ---------------- static shell icons ---------------- */
function paintShell(){
  $("hIcn").innerHTML = I("heart", true);
  $("xIcn").innerHTML = I("star", true);
  $("tabHomeI").innerHTML = I("home");
  $("tabLibI").innerHTML = I("book-open");
}

/* ---------------- Language switch ---------------- */
function setLang(l){
  state.lang = l;
  $("btnKab").classList.toggle("active", l==="kab");
  $("btnFr").classList.toggle("active", l==="fr");
  $("tabHomeL").textContent = t("tabHome");
  $("tabLibL").textContent  = t("tabLib");
  document.documentElement.lang = (l==="kab" ? "kab" : "fr");
  saveState();
  render();
}

/* ---------------- Tabs / root render ---------------- */
function goTab(tab){ state.tab = tab; state.session = null; render(); }

function setBottomMode(mode, footHTML){
  /* mode: 'tabs' -> show nav; 'foot' -> show lesson action bar */
  const foot = $("foot"), tabs = $("tabs");
  if(mode === "foot"){
    tabs.style.display = "none";
    foot.style.display = "block";
    foot.className = "foot";
    if(footHTML !== undefined) $("footWrap").innerHTML = footHTML;
  }else{
    foot.style.display = "none";
    tabs.style.display = "flex";
  }
}

function render(){
  $("statHearts").textContent = state.hearts;
  $("statXP").textContent = state.xp;
  $("tabHome").classList.toggle("active", state.tab==="home" && !state.session);
  $("tabLib").classList.toggle("active", state.tab==="lib" && !state.session);
  if(state.session){ renderStep(); }
  else if(state.tab==="lib"){ setBottomMode("tabs"); renderLib(); }
  else { setBottomMode("tabs"); renderHome(); }
}

/* ---------------- HOME ---------------- */
function renderHome(){
  let firstIncomplete = UNITS.findIndex(u=>!(state.progress[u.id]&&state.progress[u.id].done));
  if(firstIncomplete === -1) firstIncomplete = UNITS.length;
  const nodes = UNITS.map((u,i)=>{
    const pr = state.progress[u.id];
    const done = pr && pr.done;
    const cur = i === firstIncomplete;
    const stars = done ? "★".repeat(pr.stars)+"☆".repeat(3-pr.stars) : "";
    return `
      <div class="node ${done?"done":""} ${cur?"current":""}">
        <button class="node-btn" onclick="startLesson(${i})" aria-label="${esc(u.title[state.lang])}">
          ${I(u.icon)}
        </button>
        <div class="stars">${stars}</div>
        <div class="nlabel">${i+1}. ${esc(u.title[state.lang])}</div>
      </div>`;
  }).join("");
  $("main").innerHTML = `
    <div class="hero">
      <h1>${esc(t("heroTitle"))}</h1>
      <p>${esc(t("heroSub"))}</p>
      <div class="streakline">${I("flame")} ${state.streak} ${esc(t("streak"))}</div>
    </div>
    ${bookCard()}
    <h2 style="font-size:1.1rem;margin-bottom:4px;color:var(--blue-dark)">${esc(t("lessons"))}</h2>
    <div class="path">${nodes}</div>`;
  $("main").scrollTop = 0;
}

/* ---------------- LESSON ENGINE ---------------- */
const LESSON_SIZE = 10;

function startLesson(idx){
  const unit = UNITS[idx];
  const pool = shuffle(unit.pool()).slice(0, LESSON_SIZE);
  const steps = [
    ...unit.rules.map(r=>({type:"rule", rule:r})),
    ...pool
  ];
  state.session = {unitIdx:idx, steps, i:0, mistakes:0, correct:0, requeued:new Set(), practice:false};
  state.hearts = 4;
  render();
}

function quitLesson(){ state.session=null; state.tab="home"; render(); }

function renderStep(){
  const s = state.session;
  if(s.i >= s.steps.length){ renderEnd(); return; }
  const step = s.steps[s.i];
  const pct = Math.round((s.i / s.steps.length) * 100);

  let body = "";
  if(step.type === "rule") body = ruleHTML(step.rule);
  else if(step.type === "fix") body = fixHTML(step);
  else if(step.type === "pick") body = pickHTML(step);
  else if(step.type === "tf") body = tfHTML(step);
  else if(step.type === "tiles") body = tilesHTML(step);
  else if(step.type === "match") body = matchHTML(step);

  $("main").innerHTML = `
    <div class="lesson-top">
      <button class="quitbtn" onclick="quitLesson()" aria-label="Quit">${I("x")}</button>
      <div class="pbar"><div style="width:${pct}%"></div></div>
      <div class="lesson-hearts">${s.practice ? I("graduation-cap") : I("heart", true)+" "+state.hearts}</div>
    </div>
    <div class="step" id="stepBox">${body}</div>`;
  $("main").scrollTop = 0;

  setBottomMode("foot",
    step.type==="rule"
      ? `<button class="bigbtn" onclick="advance()">${esc(t("skipRule"))}</button>`
      : `<button class="bigbtn" id="checkBtn" disabled onclick="checkAnswer()">${esc(t("check"))}</button>`);

  requestAnimationFrame(()=>{ const p=$("main").querySelector(".pbar>div"); if(p) p.style.width=pct+"%"; });
}

function ruleHTML(r){
  const chips = (r.ex||[]).map(x=>`<span>${esc(x)}</span>`).join("");
  return `<div class="card rulecard">
    <span class="rtag">${I("book-marked")} ${esc(t("rule"))}</span>
    <p class="rk">${esc(r.k)}</p>
    ${state.lang==="fr" ? `<p class="rf">${esc(r.f)}</p>` : ""}
    <div class="exchips">${chips}</div>
  </div>`;
}

/* --- fix / pick --- */
let sel = null;
function fixHTML(step){
  sel = null;
  step._shuffled = shuffle(step.opts);
  const opts = step._shuffled.map((o,i)=>`<button class="opt" data-i="${i}" data-v="${esc(o)}" onclick="selectOpt(this)">${esc(o)}</button>`).join("");
  return `<p class="prompt">${esc(t("fixThis"))}</p>
    <div><span class="wrongword">${esc(step.wrong)}</span></div>
    <div class="opts">${opts}</div>`;
}
function pickHTML(step){
  sel = null;
  step._shuffled = shuffle(step.opts);
  const opts = step._shuffled.map((o,i)=>`<button class="opt" data-i="${i}" data-v="${esc(o)}" onclick="selectOpt(this)">${esc(o)}</button>`).join("");
  return `<p class="prompt">${esc(t("pickCorrect"))}</p>
    ${step.ctx?`<p class="ctxnote">${esc(step.ctx)}</p>`:""}
    <div class="opts">${opts}</div>`;
}
function selectOpt(btn){
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("sel"));
  btn.classList.add("sel");
  sel = parseInt(btn.dataset.i,10);
  const cb = $("checkBtn"); if(cb) cb.disabled = false;
}

/* --- true / false --- */
function tfHTML(step){
  sel = null;
  const stmt = state.lang==="fr" ? step.sF : step.sK;
  return `<p class="prompt">${esc(t("tfQ"))}</p>
    <div class="card"><p style="font-weight:600;font-size:1.02rem">${esc(stmt)}</p></div>
    <div class="opts tf">
      <button class="opt" data-i="1" onclick="selectOpt(this)"><span class="tficn-true">${I("check")}</span> ${esc(t("tTrue"))}</button>
      <button class="opt" data-i="0" onclick="selectOpt(this)"><span class="tficn-false">${I("x")}</span> ${esc(t("tFalse"))}</button>
    </div>`;
}

/* --- tiles (word bank) --- */
let tileState = null;
function tilesHTML(step){
  const bank = shuffle([...step.tokens, ...step.distractors]);
  tileState = {picked:[], bank};
  const tiles = bank.map((tk,i)=>`<button class="tile" data-i="${i}" onclick="pickTile(this)">${esc(tk)}</button>`).join("");
  return `<p class="prompt">${esc(t("buildIt"))}</p>
    <div><span class="wrongword">${esc(step.wrong)}</span></div>
    <div class="answer-zone" id="azone"></div>
    <div class="bank" id="bank">${tiles}</div>`;
}
function pickTile(btn){
  const i = parseInt(btn.dataset.i,10);
  btn.classList.add("used");
  tileState.picked.push({i, w:tileState.bank[i]});
  redrawZone();
}
function unpickTile(pos){
  const it = tileState.picked.splice(pos,1)[0];
  const orig = document.querySelector(`#bank .tile[data-i="${it.i}"]`);
  if(orig) orig.classList.remove("used");
  redrawZone();
}
function redrawZone(){
  $("azone").innerHTML = tileState.picked.map((p,idx)=>
    `<button class="tile" onclick="unpickTile(${idx})">${esc(p.w)}</button>`).join("");
  const cb = $("checkBtn"); if(cb) cb.disabled = tileState.picked.length===0;
}

/* --- matching --- */
let matchState = null;
function matchHTML(step){
  const lefts = shuffle(step.pairs.map(p=>p[0]));
  const rights = shuffle(step.pairs.map(p=>p[1]));
  matchState = {pairs:step.pairs, selL:null, selR:null, locked:0, erred:false};
  const cells = [];
  for(let i=0;i<lefts.length;i++){
    cells.push(`<button class="mitem" data-side="L" data-v="${esc(lefts[i])}" onclick="tapMatch(this)">${esc(lefts[i])}</button>`);
    cells.push(`<button class="mitem" data-side="R" data-v="${esc(rights[i])}" onclick="tapMatch(this)">${esc(rights[i])}</button>`);
  }
  const prompt = state.lang==="fr" ? step.pF : step.pK;
  return `<p class="prompt">${esc(prompt)}</p><div class="matchgrid">${cells.join("")}</div>`;
}
function tapMatch(btn){
  const side = btn.dataset.side;
  document.querySelectorAll(`.mitem[data-side="${side}"]`).forEach(m=>m.classList.remove("sel"));
  btn.classList.add("sel");
  if(side==="L") matchState.selL = btn; else matchState.selR = btn;
  if(matchState.selL && matchState.selR){
    const l = matchState.selL.dataset.v, r = matchState.selR.dataset.v;
    const good = matchState.pairs.some(p=>p[0]===l && p[1]===r);
    if(good){
      matchState.selL.classList.remove("sel"); matchState.selR.classList.remove("sel");
      matchState.selL.classList.add("lock");   matchState.selR.classList.add("lock");
      matchState.locked++;
      if(matchState.locked === matchState.pairs.length){
        finishStep(!matchState.erred, null);
      }
    }else{
      const L=matchState.selL, R=matchState.selR;
      L.classList.add("err"); R.classList.add("err");
      if(!matchState.erred){ matchState.erred = true; loseHeart(); }
      $("stepBox").classList.add("shake");
      setTimeout(()=>{
        L.classList.remove("err","sel"); R.classList.remove("err","sel");
        const sb=$("stepBox"); if(sb) sb.classList.remove("shake");
      }, 450);
    }
    matchState.selL = null; matchState.selR = null;
  }
}

/* --- answer checking --- */
function checkAnswer(){
  const step = state.session.steps[state.session.i];
  let good = false, fixText = "", exp = "";

  if(step.type==="fix"){
    good = step._shuffled[sel] === step.right;
    fixText = step.right;
  }else if(step.type==="pick"){
    good = step._shuffled[sel] === step.correct;
    fixText = step.correct;
    exp = state.lang==="fr" ? (step.expF||"") : (step.expK||"");
  }else if(step.type==="tf"){
    good = (sel===1) === step.answer;
    fixText = step.answer ? t("tTrue") : t("tFalse");
  }else if(step.type==="tiles"){
    const built = tileState.picked.map(p=>p.w).join(" ");
    good = built === step.tokens.join(" ");
    fixText = step.right;
  }
  finishStep(good, fixText, exp);
}

function finishStep(good, fixText, exp){
  const s = state.session;
  const step = s.steps[s.i];
  document.querySelectorAll(".opt").forEach(o=>{
    o.style.pointerEvents="none";
    const v = o.dataset.v;
    if(step.type==="fix" && v===step.right) o.classList.add("good");
    if(step.type==="pick" && v===step.correct) o.classList.add("good");
    if(o.classList.contains("sel") && !good) o.classList.add("bad");
  });
  const foot = $("foot"), wrap = $("footWrap");
  if(good){
    s.correct++;
    state.xp += 10;
    foot.classList.add("ok");
    wrap.innerHTML = `
      <div class="fb-title">${I("circle-check")} ${esc(Math.random()<.5?t("ok"):t("okAlt"))} +10</div>
      ${exp?`<div class="fb-body">${esc(exp)}</div>`:""}
      <button class="bigbtn" onclick="advance()">${esc(t("cont"))} ${I("arrow-right")}</button>`;
  }else{
    s.mistakes++;
    loseHeart();
    $("stepBox").classList.add("shake");
    foot.classList.add("ko");
    wrap.innerHTML = `
      <div class="fb-title">${I("circle-x")} ${esc(t("ko"))}</div>
      <div class="fb-body">${fixText?`${esc(t("theFix"))} <b>${esc(fixText)}</b>`:""}${exp?`<br>${esc(exp)}`:""}</div>
      <button class="bigbtn redb" onclick="advance()">${esc(t("cont"))} ${I("arrow-right")}</button>`;
    if(!s.requeued.has(step)){
      s.requeued.add(step);
      const copy = Object.assign({}, step);
      delete copy._shuffled;
      s.steps.push(copy);
    }
  }
  $("statXP").textContent = state.xp;
  saveState();
}

function loseHeart(){
  const s = state.session;
  if(s.practice) return;
  state.hearts = Math.max(0, state.hearts-1);
  $("statHearts").textContent = state.hearts;
  const lh = document.querySelector(".lesson-hearts");
  if(lh){ lh.innerHTML = I("heart", true)+" "+state.hearts; }
  if(state.hearts===0) showHeartsModal();
}
function showHeartsModal(){
  const d = document.createElement("div");
  d.className="modal-bg"; d.id="hmodal";
  d.innerHTML = `<div class="modal">
    <div class="bigicn">${I("heart-crack")}</div>
    <h3>${esc(t("heartsOut"))}</h3>
    <p>${esc(t("heartsOutMsg"))}</p>
    <button class="bigbtn" style="margin-bottom:8px" onclick="practiceOn()">${esc(t("keepGoing"))}</button>
    <button class="bigbtn ghost" onclick="restartLesson()">${esc(t("restart"))}</button>
  </div>`;
  document.body.appendChild(d);
}
function practiceOn(){
  state.session.practice = true;
  const m=$("hmodal"); if(m) m.remove();
  const lh = document.querySelector(".lesson-hearts");
  if(lh){ lh.innerHTML = I("graduation-cap"); }
}
function restartLesson(){
  const m=$("hmodal"); if(m) m.remove();
  startLesson(state.session.unitIdx);
}

function advance(){
  state.session.i++;
  render();
}

/* ---------------- END SCREEN ---------------- */
function renderEnd(){
  const s = state.session;
  const unit = UNITS[s.unitIdx];
  const stars = s.mistakes===0 ? 3 : (s.mistakes<=2 ? 2 : 1);
  const prev = state.progress[unit.id];
  state.progress[unit.id] = {done:true, stars: Math.max(stars, prev?prev.stars:0)};
  state.session = null;
  saveState();
  confetti();
  $("main").innerHTML = `
    <div class="endscreen">
      <svg class="mascot" viewBox="0 0 120 120" aria-hidden="true">
        <circle cx="60" cy="62" r="50" fill="#FEF7E0" stroke="#FBBC05" stroke-width="4"/>
        <path d="M60 26 L38 44 M60 26 L82 44 M60 26 L60 72 M38 92 L60 72 L82 92 M30 60 L90 60" stroke="#EA4335" stroke-width="9" stroke-linecap="round" fill="none"/>
        <circle cx="47" cy="40" r="5" fill="#202124"/><circle cx="73" cy="40" r="5" fill="#202124"/>
        <path d="M50 98 Q60 106 70 98" stroke="#202124" stroke-width="4" fill="none" stroke-linecap="round"/>
      </svg>
      <h2>${esc(t("lessonDone"))}</h2>
      <div style="font-weight:700;color:var(--ink-soft)">${esc(unit.title[state.lang])}</div>
      <div class="endstars">${"★".repeat(stars)}${"☆".repeat(3-stars)}</div>
      <div class="endstats">
        <div class="pill">+${s.correct*10}<small>${esc(t("xpEarned"))}</small></div>
        <div class="pill">${s.mistakes}<small>${esc(t("mistakes"))}</small></div>
      </div>
      <button class="bigbtn" onclick="quitLesson()">${esc(t("backHome"))}</button>
    </div>`;
  $("main").scrollTop = 0;
  setBottomMode("tabs");
}

function confetti(){
  const colors=["#4285F4","#EA4335","#FBBC05","#34A853"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div");
    c.className="cf";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(2+Math.random()*2)+"s";
    c.style.animationDelay=(Math.random()*0.6)+"s";
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

  return `<table class="reft"><tr><th>${esc(t("errCol"))}</th><th>${esc(t("fixCol"))}</th></tr>
    ${pairs.map(p=>`<tr><td class="w">${esc(p[0])}</td><td class="r">${esc(p[1])}</td></tr>`).join("")}
  </table>`;
}
function rulesBlock(unit){
  return unit.rules.map(r=>`<div class="rline">
    <p class="rk">${esc(r.k)}</p>
    ${state.lang==="fr"?`<p class="rf">${esc(r.f)}</p>`:""}
  </div>`).join("");
}

    let tables = "";

    if(u.id==="tamsertit") tables = pairTable([...P.msNoun,...P.msRel,...P.msD,...P.msAd,...P.msWord]);
    if(u.id==="tussda") tables = pairTable(P.tussda);
    if(u.id==="tizdit1") tables = pairTable([...P.tzVerb,...P.tzNoun,...P.tzPrep,...P.tzDem,...P.tzDir]);
    if(u.id==="tizdit2") tables = pairTable([...P.tzNo,...P.adCl]);
    if(u.id==="imataren") tables = pairTable([...P.pers,...P.pret,...P.ussid]);
    if(u.id==="amaruz") tables = pairTable([...P.ttEnd,...P.amaruz]);
